name: Checker 

on: 
  push:
    branches:
      - main
  pull_request:


jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with: 
          node-version: latest
          cache: npm

      - run: npm ci
      - run: npm run build



